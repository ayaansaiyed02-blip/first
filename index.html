<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalSnap X (Startup UI)</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #050509;
  --glass: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.1);
  --fire: #ff5f1f;
  --gold: #ffb830;
  --neon: #35d4ff;
  --text: #fff;
  --muted: rgba(255,255,255,0.4);
}

body {
  margin:0;
  font-family:'Plus Jakarta Sans',sans-serif;
  background: radial-gradient(circle at 20% 30%, #0f0f25, #050509 60%);
  color:var(--text);
}

.topbar {
  padding:20px;
  font-size:24px;
  font-weight:800;
}

.card {
  margin:16px;
  padding:20px;
  border-radius:24px;
  background:var(--glass);
  backdrop-filter:blur(25px);
  border:1px solid var(--border);
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  transition:.25s;
}

.card:hover {transform:translateY(-6px) scale(1.01);}

.big {font-size:54px;font-weight:800;}

.btn {
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  background:linear-gradient(120deg,var(--fire),var(--gold));
  color:white;
  font-weight:700;
  margin-top:12px;
}

.nav {
  position:fixed;
  bottom:10px;
  left:10px;
  right:10px;
  display:flex;
  justify-content:space-around;
  padding:12px;
  border-radius:24px;
  background:rgba(20,20,30,0.7);
  backdrop-filter:blur(20px);
}

.nav button {
  background:none;border:none;color:var(--muted);
}

.nav button.active {color:var(--fire);}

.search {
  margin:16px;
  padding:14px;
  border-radius:16px;
  border:1px solid var(--border);
  background:var(--glass);
}

input {width:100%;background:none;border:none;color:white;font-size:16px;outline:none;}

.food {
  padding:14px;
  margin:10px 16px;
  border-radius:16px;
  background:var(--glass);
  border:1px solid var(--border);
  display:flex;
  justify-content:space-between;
}

</style>
</head>

<body>

<div class="topbar">🔥 CalSnap X</div>

<div class="card">
  <div class="big" id="cal">0</div>
  <div>Calories</div>
  <button class="btn" onclick="addCal(100)">+ Add 100</button>
</div>

<div class="search">
  <input placeholder="Search food..." oninput="search(this.value)">
</div>

<div id="results"></div>

<div class="nav">
  <button class="active">Home</button>
  <button>Search</button>
  <button>Quests</button>
  <button>Goals</button>
</div>

<script>
let cal=0;
function addCal(v){
 let s=cal; cal+=v; animate(s,cal);
}

function animate(s,e){
 let st=null;
 function step(t){
  if(!st) st=t;
  let p=Math.min((t-st)/500,1);
  document.getElementById('cal').innerText=Math.floor(s+(e-s)*p);
  if(p<1) requestAnimationFrame(step);
 }
 requestAnimationFrame(step);
}

function search(q){
 let r=foods.filter(f=>f.name.toLowerCase().includes(q.toLowerCase()));
 let html="";
 r.forEach(f=>{
  html+=`<div class='food' onclick='addCal(${f.cal})'>
   <div>${f.name}</div>
   <div>${f.cal} kcal</div>
  </div>`;
 });
 document.getElementById('results').innerHTML=html;
}
